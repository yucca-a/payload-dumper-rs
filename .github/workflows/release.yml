name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (static musl) ─────────────────────────────────────
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: payload-dumper-linux-x86_64
            build_tool: cross
            ext: ""

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: payload-dumper-linux-aarch64
            build_tool: cross
            ext: ""

          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            artifact: payload-dumper-linux-armv7
            build_tool: cross
            ext: ""

          # ── macOS ───────────────────────────────────────────────────
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: payload-dumper-macos-x86_64
            build_tool: cargo
            ext: ""

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: payload-dumper-macos-aarch64
            build_tool: cargo
            ext: ""

          # ── Windows ─────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: payload-dumper-windows-x86_64
            build_tool: cargo
            ext: .exe

          # ── Android (Termux / NDK) ───────────────────────────────────
          - target: aarch64-linux-android
            os: ubuntu-latest
            artifact: payload-dumper-android-aarch64
            build_tool: ndk
            ext: ""

          - target: x86_64-linux-android
            os: ubuntu-latest
            artifact: payload-dumper-android-x86_64
            build_tool: ndk
            ext: ""

          - target: armv7-linux-androideabi
            os: ubuntu-latest
            artifact: payload-dumper-android-armv7
            build_tool: ndk
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # ── cross (Linux musl) ─────────────────────────────────────────
      - name: Install cross
        if: matrix.build_tool == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # ── Android NDK ────────────────────────────────────────────────
      - name: Setup Android NDK
        if: matrix.build_tool == 'ndk'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Install cargo-ndk
        if: matrix.build_tool == 'ndk'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      # ── Build ──────────────────────────────────────────────────────
      - name: Build (cross)
        if: matrix.build_tool == 'cross'
        run: cross build --release --target ${{ matrix.target }} --bin payload-dumper

      - name: Build (cargo-ndk)
        if: matrix.build_tool == 'ndk'
        run: cargo ndk --target ${{ matrix.target }} --platform 21 build --release --bin payload-dumper

      - name: Build (cargo)
        if: matrix.build_tool == 'cargo'
        run: cargo build --release --target ${{ matrix.target }} --bin payload-dumper

      # ── Package ────────────────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          zip -j "${{ matrix.artifact }}.zip" \
            "target/${{ matrix.target }}/release/payload-dumper${{ matrix.ext }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/payload-dumper${{ matrix.ext }}" `
            -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  # ── Release ──────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
